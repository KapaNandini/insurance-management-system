<!DOCTYPE html>
<html>

<head>
<title>Insurance Calculator</title>
</head>

<body>

<h2>Insurance Calculator</h2>

Price:
<input id="price">

<br><br>

Type:
<input id="type">

<br><br>

<button onclick="calculate()">Calculate Insurance</button>

<h3 id="result"></h3>

<script>

function calculate(){

let price = document.getElementById("price").value;
let type = document.getElementById("type").value;

let insurance = 0;

if(price >= 500 && price < 2000)
insurance = 1000;

else if(price >= 2000)
insurance = 2000;

if(type == "Smartphone" || type == "Laptop")
insurance += 500;

document.getElementById("result").innerText =
"Insurance Amount: " + insurance;

}

</script>

</body>

</html>
